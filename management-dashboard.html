<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Anmol Mgmt">
<meta name="theme-color" content="#060d1a">
<title>Anmol — Management Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --bg:#060d1a;--bg2:#0a1326;--card:#0f1c32;--card2:#142040;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --green:#00d68f;--green2:rgba(0,214,143,0.1);
  --red:#ff4757;--red2:rgba(255,71,87,0.1);
  --amber:#ffa502;--amber2:rgba(255,165,2,0.1);
  --blue:#4f8ef7;--blue2:rgba(79,142,247,0.1);
  --purple:#a78bfa;--purple2:rgba(167,139,250,0.1);
  --teal:#00cec9;--teal2:rgba(0,206,201,0.1);
  --text:#e8f0ff;--text2:#6b82a8;--text3:#2d3d5a;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  --r:16px;--r-sm:10px;--r-xs:6px;
}
html{height:100%;background:var(--bg)}
body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}

/* ── HEADER ── */
.app-header{
  position:sticky;top:0;z-index:200;
  background:rgba(6,13,26,0.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:calc(env(safe-area-inset-top)+10px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;gap:12px
}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:linear-gradient(135deg,#4f8ef7,#a78bfa);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo i{font-size:20px;color:#fff}
.brand-name{font-size:15px;font-weight:700}
.brand-sub{font-size:10px;color:var(--text2);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-btn{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:7px 11px;color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;font-family:var(--font);white-space:nowrap;user-select:none}
.hdr-btn:active{opacity:0.7;transform:scale(0.97)}
.refresh-time{font-size:10px;color:var(--text3)}

/* ── PERIOD PILLS ── */
.ppill{
  padding:7px 16px;border-radius:99px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:var(--font);
  background:var(--card);border:1.5px solid var(--border2);
  color:var(--text2);transition:all 0.15s;
  outline:none;-webkit-appearance:none;user-select:none
}
.ppill:hover{border-color:var(--blue);color:var(--blue)}
.ppill.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 12px rgba(79,142,247,0.35)}
.ppill:active{transform:scale(0.95);opacity:0.85}

/* ── BODY ── */
.dash{padding:0 0 calc(env(safe-area-inset-bottom)+32px)}

/* ── SEC LABEL ── */
.sec{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;padding:18px 16px 8px;display:flex;align-items:center;gap:6px}

/* ── KPI SCROLL ── */
.kpi-row{display:flex;gap:10px;padding:0 16px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.kpi-row::-webkit-scrollbar{display:none}
.kcard{
  flex-shrink:0;width:165px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;position:relative;overflow:hidden;
  cursor:default
}
.kcard.clickable{cursor:pointer;transition:transform 0.1s,border-color 0.1s}
.kcard.clickable:active{transform:scale(0.97)}
.kcard.clickable:hover{border-color:var(--border2)}
.kcard-glow{position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;opacity:0.08;pointer-events:none}
.kcard-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.kcard-icon i{font-size:17px}
.kcard-val{font-size:19px;font-weight:800;letter-spacing:-0.02em;line-height:1}
.kcard-label{font-size:11px;color:var(--text2);margin-top:5px;font-weight:500}
.kcard-sub{font-size:10px;margin-top:6px;display:flex;align-items:center;gap:3px;font-weight:600;color:var(--text2)}
.kcard-sub.up{color:var(--green)}
.kcard-sub.down{color:var(--red)}

/* ── ALERT CHIPS ── */
.chip-row{display:flex;gap:8px;padding:0 16px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:transform 0.1s;user-select:none;-webkit-user-select:none}
.chip:active{transform:scale(0.95)}
.chip.red{background:var(--red2);color:var(--red);border-color:rgba(255,71,87,0.25)}
.chip.amber{background:var(--amber2);color:var(--amber);border-color:rgba(255,165,2,0.25)}
.chip.blue{background:var(--blue2);color:var(--blue);border-color:rgba(79,142,247,0.25)}
.chip.purple{background:var(--purple2);color:var(--purple);border-color:rgba(167,139,250,0.25)}
.chip.green{background:var(--green2);color:var(--green);border-color:rgba(0,214,143,0.25)}
.chip-n{font-size:15px;font-weight:800}

/* ── CHART CARDS ── */
.cc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;margin:0 16px 10px}
.cc-title{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.cc-title-left{display:flex;align-items:center;gap:7px}
.cc-title-right{font-size:11px;color:var(--text2);font-weight:500}
.bar-row{margin-bottom:11px}
.bar-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:8px}
.bar-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.bar-val{font-size:11px;color:var(--text2);flex-shrink:0}
.bar-track{height:6px;background:var(--bg2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 0.7s cubic-bezier(.4,0,.2,1)}
.empty-chart{text-align:center;padding:20px;color:var(--text2);font-size:13px}

/* ── BREAKDOWN CARD ── */
.breakdown-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.brkdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.brk-track{height:4px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-bottom:12px}
.brk-fill{height:100%;border-radius:99px}

/* ── AGING TABLE ── */
.agingtbl{width:100%;border-collapse:collapse}
.agingtbl td{padding:8px 0;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle}
.agingtbl tr:last-child td{border-bottom:none}
.age-lbl{color:var(--text2)}
.age-amt{text-align:right;font-weight:700;padding-right:8px}
.age-bar-wrap{width:70px}
.age-mini{height:4px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-top:3px}
.age-pct{font-size:9px;color:var(--text2);text-align:right;margin-top:2px}

/* ── VAT REPORT ── */
.vat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.vat-row:last-child{border-bottom:none;font-weight:700}
.vat-lbl{color:var(--text2);display:flex;align-items:center;gap:6px}
.vat-amt{font-weight:600}

/* ── HR GRID ── */
.hr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.hr-box{background:var(--bg2);border-radius:var(--r-sm);padding:14px 12px;text-align:center;border:1px solid var(--border);cursor:pointer;transition:transform 0.1s,border-color 0.15s;user-select:none}
.hr-box:active{transform:scale(0.96)}
.hr-box:hover{border-color:var(--border2)}
.hr-num{font-size:26px;font-weight:800;line-height:1}
.hr-lbl{font-size:10px;color:var(--text2);margin-top:4px;font-weight:500}
.hr-tap{font-size:9px;color:var(--text3);margin-top:3px;font-style:italic}
.outside-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--amber2);border-radius:var(--r-sm);border:1px solid rgba(255,165,2,0.2);font-size:12px;margin-bottom:6px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:flex-end;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal-sheet{
  width:100%;max-height:90dvh;background:var(--card2);
  border-radius:24px 24px 0 0;border-top:1px solid var(--border2);
  overflow-y:auto;padding:0 0 env(safe-area-inset-bottom);
  animation:slideUp 0.3s cubic-bezier(.4,0,.2,1)
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:12px auto 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.modal-close{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:6px 10px;color:var(--text2);cursor:pointer;font-size:18px;line-height:1}
.modal-body{padding:14px 16px}
.modal-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.modal-row:last-child{border-bottom:none}
.modal-row-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-row-icon i{font-size:17px}
.modal-row-content{flex:1;min-width:0}
.modal-row-title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-row-sub{font-size:11px;color:var(--text2);margin-top:2px}
.modal-row-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.m-btn{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:opacity 0.1s}
.m-btn:active{opacity:0.8}
.m-btn.approve{background:var(--green);color:#000}
.m-btn.reject{background:var(--red2);color:var(--red);border:1px solid var(--red)}
.m-btn.view{background:var(--blue2);color:var(--blue);border:1px solid var(--blue)}
.m-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700}

/* ── ALERT LIST ── */
.alert-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.alert-item:last-child{border-bottom:none}
.alert-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alert-icon i{font-size:17px}
.alert-content{flex:1;min-width:0}
.alert-title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alert-desc{font-size:11px;color:var(--text2);margin-top:2px}
.alert-badge{flex-shrink:0;font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;align-self:center}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;gap:16px;color:var(--text2)}
.spin{width:28px;height:28px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom)+16px);left:16px;right:16px;padding:13px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;z-index:999;animation:tUp 0.3s ease;display:flex;align-items:center;gap:8px}
@keyframes tUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.toast.ok{background:var(--green);color:#000}
.toast.err{background:var(--red);color:#fff}
.toast.info{background:var(--blue);color:#fff}
</style>
</head>
<body>

<!-- Header -->
<div class="app-header">
  <div class="brand">
    <div class="logo"><i class="ti ti-chart-pie"></i></div>
    <div>
      <div class="brand-name">Management</div>
      <div class="brand-sub">Anmol Pharmaceuticals</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="refresh-time" id="refresh-time">—</span>
    <button class="hdr-btn" onclick="loadData()"><i class="ti ti-refresh" style="font-size:14px"></i>Refresh</button>
  </div>
</div>

<!-- Period filter -->
<div style="background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
  <label style="font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap">Period:</label>
  <select id="period-select"
    style="padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
           background:var(--card2);border:1.5px solid var(--blue);color:var(--blue);
           font-family:var(--font);outline:none;min-width:160px">
    <option value="month">This Month</option>
    <option value="lastmonth">Last Month</option>
    <option value="quarter">This Quarter</option>
    <option value="year">This Year</option>
    <option value="all">All Time</option>
    <option value="custom">Custom Range…</option>
  </select>
  <div id="custom-range" style="display:none;align-items:center;gap:8px;flex-wrap:wrap">
    <input type="date" id="custom-from"
      style="padding:7px 10px;border-radius:8px;border:1.5px solid var(--border2);
             background:var(--card2);color:var(--text);font-size:13px;font-family:var(--font);outline:none">
    <span style="color:var(--text2);font-size:12px">to</span>
    <input type="date" id="custom-to"
      style="padding:7px 10px;border-radius:8px;border:1.5px solid var(--border2);
             background:var(--card2);color:var(--text);font-size:13px;font-family:var(--font);outline:none">
    <button id="apply-range-btn"
      style="padding:7px 18px;border-radius:8px;background:var(--blue);border:none;
             color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)">Apply</button>
  </div>
</div>

<!-- Dashboard body -->
<div class="dash" id="dash">
  <div class="loading"><div class="spin"></div><span>Loading dashboard…</span></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="modal-title">—</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ── FIREBASE CONFIG ──────────────────────────────────────────────────────────
let db = null;
const FB_CONFIG = {
  apiKey:"AIzaSyCtApiphcSMdEo-hmIkefIeQGvmusG2B6M",
  authDomain:"anmol-accounting.firebaseapp.com",
  projectId:"anmol-accounting",
  storageBucket:"anmol-accounting.firebasestorage.app",
  messagingSenderId:"838744686940",
  appId:"1:838744686940:web:28d9b95c27031abf794199"
};
function initFirebase() {
  if(typeof firebase==='undefined'){setTimeout(initFirebase,100);return;}
  if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
  db = firebase.firestore();
  loadData();
}

// ── STATE ────────────────────────────────────────────────────────────────────
let period = 'month';
let customFrom = '';
let customTo = '';
let S = null;

// ── HELPERS ─────────────────────────────────────────────────────────────────
const today = () => new Date().toISOString().split('T')[0];
const fmt   = n => '₱'+(Math.abs(+n)||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK  = n => {n=+n; const a=Math.abs(n),pfx=n<0?'-₱':'₱'; return a>=1e6?pfx+(a/1e6).toFixed(2)+'M':a>=1e3?pfx+(a/1e3).toFixed(1)+'k':pfx+a.toLocaleString('en-PH',{minimumFractionDigits:0,maximumFractionDigits:0});}
const fmtS  = n => (n<0?'−':'+')+fmt(Math.abs(n));
const COLORS = ['#4f8ef7','#00d68f','#ffa502','#a78bfa','#ff6b81'];

function invStatus(inv,cols){
  if(inv.status==='cancelled') return 'cancelled';
  const paid=(cols||[]).filter(c=>(c.invoices||[]).includes(inv.id)||c.invoice===inv.id).reduce((s,c)=>s+(c.netCash||c.amount||0),0);
  if(paid>=(inv.amount||0)&&(inv.amount||0)>0) return 'paid';
  if(inv.due&&inv.due<today()) return 'overdue';
  return 'pending';
}

function inPd(date){
  if(!date) return false;
  if(period==='all') return true;
  const now=new Date(), d=date.slice(0,10), y=now.getFullYear(), m=now.getMonth();

  if(period==='month'){
    // 1st to last day of current month
    const start=new Date(y,m,1).toISOString().slice(0,10);
    const end=new Date(y,m+1,0).toISOString().slice(0,10); // day 0 of next month = last of this month
    return d>=start&&d<=end;
  }
  if(period==='lastmonth'){
    // 1st to last day of previous month
    const start=new Date(y,m-1,1).toISOString().slice(0,10);
    const end=new Date(y,m,0).toISOString().slice(0,10);
    return d>=start&&d<=end;
  }
  if(period==='quarter'){
    const qStart=Math.floor(m/3)*3;
    const start=new Date(y,qStart,1).toISOString().slice(0,10);
    const end=new Date(y,qStart+3,0).toISOString().slice(0,10); // last day of quarter
    return d>=start&&d<=end;
  }
  if(period==='year'){
    return d>=`${y}-01-01`&&d<=`${y}-12-31`;
  }
  if(period==='custom') return customFrom&&customTo&&d>=customFrom&&d<=customTo;
  return true;
}

// ── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadData(){
  document.getElementById('dash').innerHTML = '<div class="loading"><div class="spin"></div><span>Loading…</span></div>';
  try {
    const doc = await db.doc('companies/anmol').get();
    if(!doc.exists) throw new Error('No ERP data found.');
    S = JSON.parse(doc.data().data||'{}');
    document.getElementById('refresh-time').textContent = new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
    render();
  } catch(e) {
    document.getElementById('dash').innerHTML = `<div class="loading"><i class="ti ti-wifi-off" style="font-size:32px;color:var(--red)"></i><span>${e.message}</span><button onclick="loadData()" style="padding:8px 20px;background:var(--blue);color:#fff;border:none;border-radius:99px;font-size:13px;cursor:pointer;font-family:var(--font)">Retry</button></div>`;
  }
}

// ── PERIOD SWITCH ────────────────────────────────────────────────────────────
function selectPeriod(val, el){
  try {
    const cr = document.getElementById('custom-range');
    document.querySelectorAll('.ppill').forEach(p=>p.classList.remove('active'));
    if(el) el.classList.add('active');
    if(val==='custom'){
      cr.style.display='flex';
      const now=new Date();
      document.getElementById('custom-from').value=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);
      document.getElementById('custom-to').value=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().slice(0,10);
      return;
    }
    cr.style.display='none';
    period=val; customFrom=''; customTo='';
    if(S) render();
    else loadData();
  } catch(e) { console.error('selectPeriod error:', e); alert('Error: '+e.message); }
}

function applyCustomRange(){
  const f=document.getElementById('custom-from').value;
  const t=document.getElementById('custom-to').value;
  if(!f||!t){alert('Please select both start and end dates.');return;}
  if(f>t){alert('Start date must be before end date.');return;}
  period='custom'; customFrom=f; customTo=t;
  if(S) render();
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function showModal(title, iconHtml, bodyHtml){
  document.getElementById('modal-title').innerHTML = iconHtml+' '+title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow='';
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg,type='info',ms=3000){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<i class="ti ti-${type==='ok'?'check':type==='err'?'x':'info-circle'}"></i>${msg}`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),ms);
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  try { _render(); }
  catch(e) {
    console.error('Render error:', e);
    document.getElementById('dash').innerHTML = `<div class="loading"><i class="ti ti-bug" style="font-size:32px;color:var(--red)"></i><span style="color:var(--red)">${e.message}</span><button onclick="loadData()" style="padding:8px 20px;background:var(--blue);color:#fff;border:none;border-radius:99px;font-size:13px;cursor:pointer;font-family:var(--font)">Reload</button></div>`;
  }
}
function _render(){
  const now = new Date();
  const todayStr = today();
  const invoices    = S.invoices||[];
  const collections = S.collections||[];
  const expenses    = S.expenses||[];
  const journal     = S.journal||[];
  const pos         = S.purchaseOrders||[];
  const sos         = S.salesOrders||[];
  const employees   = S.employees||[];
  const attendance  = S.attendance||[];
  const inventory   = S.inventory||[];
  const accounts    = S.accounts||[];
  const empDocs     = S.empDocuments||[];
  const leaves      = S.leaves||[];

  const expAccIds = new Set(accounts.filter(a=>a.type==='Expense').map(a=>String(a.id)));
  const lastMo = new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().slice(0,7);

  // AP account
  const apAcc = accounts.find(a=>{const n=(a.name||'').toLowerCase();return n.includes('accounts payable')&&!n.includes('tax');});
  const jrnl = journal.filter(j=>!j.cancelled);
  const apCr = apAcc ? jrnl.filter(j=>j.credit&&String(j.credit)===String(apAcc.id)).reduce((s,j)=>s+(j.amount||0),0) : 0;
  const apDr = apAcc ? jrnl.filter(j=>j.debit&&String(j.debit)===String(apAcc.id)).reduce((s,j)=>s+(j.amount||0),0) : 0;
  const totalAP = Math.max(0,apCr-apDr);

  // Period-filtered sets
  const filtInv = invoices.filter(i=>i.status!=='cancelled'&&inPd(i.date));
  const prevInv = invoices.filter(i=>i.status!=='cancelled'&&i.date?.startsWith(lastMo));
  const filtCol = collections.filter(c=>inPd(c.date));
  const filtExp = expenses.filter(e=>inPd(e.date));
  const dvExp   = journal.filter(j=>j.type==='disbursement'&&!j.cancelled&&j.debit&&expAccIds.has(String(j.debit))&&inPd(j.date));
  const filtPO  = pos.filter(p=>inPd(p.date));

  const totalRev = filtInv.reduce((s,i)=>s+(i.amount||0),0);
  const prevRev  = prevInv.reduce((s,i)=>s+(i.amount||0),0);
  const revTrend = prevRev>0?((totalRev-prevRev)/prevRev*100).toFixed(1):null;
  const totalExp = filtExp.reduce((s,e)=>s+(e.amount||0),0)+dvExp.reduce((s,j)=>s+(j.amount||0),0);
  const totalPur = filtPO.reduce((s,p)=>s+(p.lines||[]).reduce((ls,l)=>ls+(l.lineTotal||0),0),0);
  const totalCol = filtCol.reduce((s,c)=>s+(c.netCash||c.amount||0),0);
  const netIncome= totalRev-totalPur-totalExp;

  // VAT
  const vatInv = filtInv.filter(i=>!i.vatExempt);
  const outputVat = vatInv.reduce((s,i)=>s+(i.vat||((i.vatBase||i.amount||0)*0.12)||0),0);
  const vatBase   = vatInv.reduce((s,i)=>s+(i.vatBase||(i.amount||0)/1.12),0);
  const exemptSales= filtInv.filter(i=>i.vatExempt).reduce((s,i)=>s+(i.amount||0),0);
  // Input VAT from PO journal entries
  const inputVatAccs = accounts.filter(a=>(a.name||'').toLowerCase().includes('input vat')).map(a=>String(a.id));
  const inputVat = jrnl.filter(j=>j.debit&&inputVatAccs.includes(String(j.debit))&&inPd(j.date)).reduce((s,j)=>s+(j.amount||0),0);
  const vatPayable = Math.max(0,outputVat-inputVat);

  // AR
  const unpaid = invoices.filter(i=>{const st=invStatus(i,collections);return st==='pending'||st==='overdue';});
  const totalAR = unpaid.reduce((s,i)=>s+(i.amount||0),0);
  const overdueInvs = invoices.filter(i=>invStatus(i,collections)==='overdue');

  // AR Aging
  const aging={cur:0,d30:0,d60:0,d90:0,d90p:0};
  unpaid.forEach(i=>{
    if(!i.due) return;
    const d=Math.floor((now-new Date(i.due))/864e5);
    if(d<=0) aging.cur+=i.amount||0;
    else if(d<=30) aging.d30+=i.amount||0;
    else if(d<=60) aging.d60+=i.amount||0;
    else if(d<=90) aging.d90+=i.amount||0;
    else           aging.d90p+=i.amount||0;
  });

  // Top customers / products
  const custMap={};
  filtInv.forEach(i=>{if(!custMap[i.customer])custMap[i.customer]=0;custMap[i.customer]+=(i.amount||0);});
  const top5C=Object.entries(custMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxC=top5C.length?top5C[0][1]:1;

  const prodMap={};
  filtInv.forEach(inv=>(inv.lines||[]).forEach(l=>{
    const k=l.desc||l.itemId||'?';
    if(!prodMap[k])prodMap[k]={qty:0,rev:0};
    prodMap[k].qty+=(l.qty||0);prodMap[k].rev+=(l.lineTotal||0);
  }));
  const top5P=Object.entries(prodMap).sort((a,b)=>b[1].rev-a[1].rev).slice(0,5);
  const maxP=top5P.length?top5P[0][1].rev:1;

  // HR
  const todayAtt=attendance.filter(a=>a.date===todayStr);
  const present=todayAtt.filter(a=>a.status==='present').length;
  const absent=employees.filter(e=>!todayAtt.find(a=>a.empId===e.id)).length;
  const outside=todayAtt.filter(a=>a.locTag==='outside');
  const pendLeave=leaves.filter(l=>l.status==='pending').length;

  // Inventory
  const outStock=inventory.filter(i=>(i.qty||0)===0);
  const lowStock=inventory.filter(i=>(i.qty||0)>0&&(i.qty||0)<=(i.reorderLevel||5));
  const expDocs=empDocs.filter(d=>{if(!d.expiry)return false;return Math.floor((new Date(d.expiry)-now)/864e5)<=30;});
  const pendPO=pos.filter(p=>p.status==='pending');
  const pendSO=sos.filter(s=>s.status==='pending');

  const PL = {month:'This Month',quarter:'This Quarter',year:'This Year',all:'All Time'}[period];
  const barColors = COLORS;

  const bbar=(val,max,color)=>`<div class="bar-track"><div class="bar-fill" style="width:${max>0?(val/max*100).toFixed(1):0}%;background:${color}"></div></div>`;

  let h = '';

  // ── Alert chips ──
  const chips=[
    [overdueInvs.length,'Overdue','red','ti-file-invoice','openOverdueInvoices'],
    [pendPO.length+pendSO.length,'Pending PO/SO','amber','ti-clock-pause','openPendingPO'],
    [outStock.length+lowStock.length,'Stock Alert','red','ti-package-off','openStockAlerts'],
    [pendLeave,'Leave Req.','blue','ti-beach','openLeaves'],
    [expDocs.length,'Expiring Docs','purple','ti-file-alert','openExpDocs'],
  ].filter(([n])=>n>0);
  if(chips.length){
    h+=`<div class="sec"><i class="ti ti-bell"></i>Action Required</div>
    <div class="chip-row">${chips.map(([n,lbl,clr,ico,fn])=>`
    <div class="chip ${clr}" onclick="${fn}()">
      <i class="ti ${ico}"></i><span class="chip-n">${n}</span><span>${lbl}</span>
    </div>`).join('')}</div>`;
  }

  // ── Financial KPIs ──
  h+=`<div class="sec"><i class="ti ti-coin"></i>Financials — ${PL}</div>
  <div class="kpi-row">
    ${kc('ti-trending-up','Revenue',fmtK(totalRev),'var(--green)','var(--green2)',
      revTrend?`<span class="${+revTrend>=0?'up':'down'}"><i class="ti ti-trending-${+revTrend>=0?'up':'down'}"></i>${Math.abs(revTrend)}% vs last mo</span>`
              :`<span>${filtInv.length} invoices</span>`)}
    ${kc('ti-coin','Net Income',fmtK(netIncome),netIncome>=0?'var(--green)':'var(--red)',netIncome>=0?'var(--green2)':'var(--red2)',
      `<span class="${netIncome>=0?'up':'down'}"><i class="ti ti-${netIncome>=0?'plus':'minus'}"></i>Rev−Pur−Exp</span>`)}
    ${kc('ti-cash','Collections',fmtK(totalCol),'var(--blue)','var(--blue2)',
      `<span>AR: ${fmtK(totalAR)}</span>`)}
    ${kc('ti-receipt','Expenses',fmtK(totalExp),'var(--red)','var(--red2)',
      `<span>Pur: ${fmtK(totalPur)}</span>`)}
    ${kc('ti-building-bank','Payables (AP)',fmtK(totalAP),'var(--amber)','var(--amber2)',
      `<span>Outstanding</span>`)}
    ${kc('ti-file-alert','Overdue AR',fmtK(overdueInvs.reduce((s,i)=>s+(i.amount||0),0)),'var(--red)','var(--red2)',
      `<span class="down"><i class="ti ti-alert-triangle"></i>${overdueInvs.length} invoices</span>`,true,'openOverdueInvoices()')}
  </div>`;

  // ── HR KPIs (clickable) ──
  h+=`<div class="sec"><i class="ti ti-users"></i>HR Today — ${todayStr} <span style="font-size:9px;color:var(--text3);margin-left:4px">(tap to view)</span></div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px;margin-bottom:4px">
    ${[
      [present,'Present','var(--green)','var(--green2)','openPresent()'],
      [absent,'Absent','var(--red)','var(--red2)','openAbsent()'],
      [outside.length,'Outside','var(--amber)','var(--amber2)','openOutside()'],
      [pendLeave,'Leave Req.','var(--purple)','var(--purple2)','openLeaves()'],
    ].map(([n,lbl,clr,bg,fn])=>`
    <div class="hr-box" style="border-color:${clr}33;background:${bg}" onclick="${fn}">
      <div class="hr-num" style="color:${clr}">${n}</div>
      <div class="hr-lbl">${lbl}</div>
      <div class="hr-tap">tap to view</div>
    </div>`).join('')}
  </div>`;

  // Outside list
  if(outside.length){
    h+=`<div style="padding:4px 16px 0">
    ${outside.map(a=>{
      const emp=employees.find(e=>e.id===a.empId)||{name:a.empName||'?'};
      return `<div class="outside-item" onclick="openOutside()">
        <span style="font-size:12px;font-weight:600">${emp.name}</span>
        <span style="font-size:11px;color:var(--amber)">⚠ ${a.locDist?a.locDist+'m away':'Outside'}</span>
      </div>`;
    }).join('')}</div>`;
  }

  // ── Income Breakdown ──
  h+=`<div class="sec"><i class="ti ti-chart-bar"></i>Income Breakdown — ${PL}</div>
  <div class="cc">
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:14px">
      <div style="font-size:28px;font-weight:800;color:${netIncome>=0?'var(--green)':'var(--red)'}">${fmtK(netIncome)}</div>
      <div style="font-size:12px;color:var(--text2)">${netIncome>=0?'Profit':'Loss'}</div>
    </div>
    ${[
      [totalRev,'Revenue','var(--green)'],
      [totalPur,'Purchases','var(--blue)'],
      [totalExp,'Expenses','var(--red)'],

    <div class="brk-track"><div class="brk-fill" style="width:${totalRev>0?(amt/totalRev*100).toFixed(1):0}%;background:${clr}"></div></div>`).join('')}
  </div>`;

  // ── VAT Summary ──
  h+=`<div class="sec"><i class="ti ti-receipt-tax"></i>VAT Summary — ${PL}</div>
  <div class="cc">
    <table style="width:100%;border-collapse:collapse">
      <tr class="vat-row"><td class="vat-lbl"><i class="ti ti-trending-up" style="color:var(--green)"></i>Taxable Sales (ex VAT)</td><td class="vat-amt" style="color:var(--green)">${fmt(vatBase)}</td></tr>
      <tr class="vat-row"><td class="vat-lbl"><i class="ti ti-plus" style="color:var(--green)"></i>Output VAT (12%)</td><td class="vat-amt" style="color:var(--green)">${fmt(outputVat)}</td></tr>
      ${exemptSales>0?`<tr class="vat-row"><td class="vat-lbl"><i class="ti ti-minus" style="color:var(--text2)"></i>VAT-Exempt Sales</td><td class="vat-amt" style="color:var(--text2)">${fmt(exemptSales)}</td></tr>`:''}
      <tr class="vat-row"><td class="vat-lbl"><i class="ti ti-minus" style="color:var(--red)"></i>Input VAT (from POs)</td><td class="vat-amt" style="color:var(--red)">−${fmt(inputVat)}</td></tr>
      <tr class="vat-row" style="border-top:2px solid var(--border2)">
        <td class="vat-lbl" style="color:var(--text);font-weight:700"><i class="ti ti-coin" style="color:var(--amber)"></i>VAT Payable</td>
        <td class="vat-amt" style="font-size:16px;color:${vatPayable>0?'var(--amber)':'var(--green)'}">
          ${vatPayable>0?fmt(vatPayable):'<span style="color:var(--green)">Credit / Refundable</span>'}
        </td>
      </tr>
    </table>
    <div style="font-size:10px;color:var(--text3);margin-top:10px">* Based on invoice dates for selected period. For official BIR filing, use Reports → Sales Book.</div>
  </div>`;

  // ── AR Aging ──
  h+=`<div class="sec"><i class="ti ti-clock-dollar"></i>AR Aging</div>
  <div class="cc">
    ${totalAR===0?`<div style="text-align:center;padding:16px;color:var(--green)"><i class="ti ti-circle-check" style="font-size:24px;display:block;margin-bottom:6px"></i>No outstanding AR!</div>`:`
    <table class="agingtbl">
      ${[['Current',aging.cur,'var(--green)'],['1–30 days',aging.d30,'var(--blue)'],['31–60 days',aging.d60,'var(--amber)'],['61–90 days',aging.d90,'var(--red)'],['90+ days',aging.d90p,'#c0392b']].map(([lbl,amt,clr])=>`
      <tr>
        <td class="age-lbl">${lbl}</td>
        <td class="age-amt" style="color:${clr}">${fmtK(amt)}</td>
        <td class="age-bar-wrap"><div class="age-mini"><div style="height:100%;width:${totalAR>0?(amt/totalAR*100).toFixed(1):0}%;background:${clr};border-radius:99px"></div></div><div class="age-pct">${totalAR>0?(amt/totalAR*100).toFixed(0):0}%</div></td>
      </tr>`).join('')}
      <tr style="border-top:2px solid var(--border2)"><td style="font-weight:700;padding-top:10px">Total AR</td><td class="age-amt" style="color:var(--blue);padding-top:10px">${fmt(totalAR)}</td><td></td></tr>
    </table>`}
  </div>`;

  // ── AP Summary ──
  h+=`<div class="sec"><i class="ti ti-building-bank"></i>Accounts Payable</div>
  <div class="cc">
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px">
      <div style="font-size:28px;font-weight:800;color:var(--amber)">${fmtK(totalAP)}</div>
      <div style="font-size:12px;color:var(--text2)">Outstanding payables</div>
    </div>
    <div style="display:flex;gap:12px;font-size:12px">
      <div style="flex:1;padding:10px;background:var(--bg2);border-radius:var(--r-sm);text-align:center;border:1px solid var(--border)">
        <div style="font-size:16px;font-weight:700;color:var(--amber)">${fmt(totalAP)}</div>
        <div style="color:var(--text2);margin-top:3px">Total AP</div>
      </div>
      <div onclick="openPendingPO()" style="flex:1;padding:10px;background:var(--amber2);border-radius:var(--r-sm);text-align:center;border:1.5px solid rgba(255,165,2,0.3);cursor:pointer;transition:opacity 0.1s" onmousedown="this.style.opacity=0.7" onmouseup="this.style.opacity=1" ontouchstart="this.style.opacity=0.7" ontouchend="this.style.opacity=1">
        <div style="font-size:16px;font-weight:700;color:var(--amber)">${pendPO.length}</div>
        <div style="color:var(--amber);margin-top:3px;font-weight:600">Pending POs <i class="ti ti-chevron-right" style="font-size:11px"></i></div>
      </div>
    </div>
  </div>`;

  // ── Top Customers ──
  h+=`<div class="sec"><i class="ti ti-star"></i>Top Customers — ${PL}</div>
  <div class="cc">
    <div class="cc-title"><div class="cc-title-left"><i class="ti ti-building-store" style="color:var(--amber)"></i>By Revenue</div><span class="cc-title-right">${top5C.length} customers</span></div>
    ${top5C.length===0?`<div class="empty-chart">No sales in this period.</div>`
    :top5C.map(([name,rev],i)=>`<div class="bar-row"><div class="bar-meta"><span class="bar-name">${name}</span><span class="bar-val">${fmtK(rev)}</span></div>${bbar(rev,maxC,barColors[i])}</div>`).join('')}
  </div>`;

  // ── Top Products ──
  h+=`<div class="sec"><i class="ti ti-package"></i>Top Products — ${PL}</div>
  <div class="cc">
    <div class="cc-title"><div class="cc-title-left"><i class="ti ti-pill" style="color:var(--blue)"></i>By Revenue</div><span class="cc-title-right">${top5P.length} products</span></div>
    ${top5P.length===0?`<div class="empty-chart">No product sales in this period.</div>`
    :top5P.map(([name,d],i)=>`<div class="bar-row"><div class="bar-meta"><span class="bar-name">${name}</span><span class="bar-val">${d.qty} pcs · ${fmtK(d.rev)}</span></div>${bbar(d.rev,maxP,barColors[i])}</div>`).join('')}
  </div>`;

  // ── Daily Report ──────────────────────────────────────────────────────────
  const rptDate = window._mgmtRptDate || todayStr;
  const prevDate = new Date(new Date(rptDate).getTime() - 864e5).toISOString().slice(0,10);
  const nextDate = new Date(new Date(rptDate).getTime() + 864e5).toISOString().slice(0,10);

  const dailyCols    = collections.filter(c=>c.date===rptDate);
  const dailyColTotal= dailyCols.reduce((s,c)=>s+(c.netCash||c.amount||0),0);
  const dailyDeps    = (S.deposits||[]).filter(d=>d.date===rptDate);
  const dailyDepTotal= dailyDeps.reduce((s,d)=>s+(+d.amount||0),0);
  const dailyInv     = invoices.filter(i=>i.date===rptDate&&i.status!=='cancelled');
  const dailyInvTotal= dailyInv.reduce((s,i)=>s+(i.amount||0),0);
  const dailySO      = sos.filter(s=>s.date===rptDate||s.deliveryDate===rptDate||s.deliveredDate===rptDate);
  const dailySOTotal = dailySO.reduce((s,so)=>s+(so.lines||[]).reduce((ls,l)=>ls+(l.lineTotal||0),0),0);

  h+=`<div class="sec" style="justify-content:space-between;flex-wrap:wrap;gap:6px">
    <span style="display:flex;align-items:center;gap:6px"><i class="ti ti-report"></i>Daily Report</span>
    <div style="display:flex;align-items:center;gap:6px">
      <button onclick="window._mgmtRptDate='${prevDate}';render()" style="background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:3px 10px;color:var(--text2);cursor:pointer;font-size:14px;font-family:var(--font)">‹</button>
      <input type="date" value="${rptDate}" onchange="window._mgmtRptDate=this.value;render()" style="padding:5px 8px;border-radius:7px;border:1.5px solid var(--blue);background:var(--card2);color:var(--text);font-size:12px;font-family:var(--font);outline:none">
      <button onclick="window._mgmtRptDate='${nextDate}';render()" style="background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:3px 10px;color:var(--text2);cursor:pointer;font-size:14px;font-family:var(--font)">›</button>
      <button onclick="window._mgmtRptDate='${todayStr}';render()" style="background:var(--blue2);border:1px solid var(--blue);border-radius:6px;padding:4px 10px;color:var(--blue);cursor:pointer;font-size:11px;font-weight:700;font-family:var(--font)">Today</button>
    </div>
  </div>
  <div class="kpi-row">
    ${kc('ti-cash','Collections',fmtK(dailyColTotal),'var(--green)','var(--green2)',
      `<span>${dailyCols.length} record${dailyCols.length!==1?'s':''} · tap to view</span>`,true,'openDailyCollections()')}
    ${kc('ti-building-bank','Deposits',fmtK(dailyDepTotal),'var(--blue)','var(--blue2)',
      `<span>${dailyDeps.length} record${dailyDeps.length!==1?'s':''} · tap to view</span>`,true,'openDailyDeposits()')}
    ${kc('ti-file-invoice','Sales Invoices',fmtK(dailyInvTotal),'var(--amber)','var(--amber2)',
      `<span>${dailyInv.length} issued · tap to view</span>`,true,'openDailyInvoices()')}
    ${kc('ti-truck-delivery','Delivery Receipts',fmtK(dailySOTotal),'var(--purple)','var(--purple2)',
      `<span>${dailySO.length} DR${dailySO.length!==1?'s':''} · tap to view</span>`,true,'openDailySO()')}
  </div>`;

  // ── Undelivered SO Items ──
  const activeSOs = sos.filter(s=>s.status!=='delivered'&&s.status!=='cancelled');
  const undeliveredSOs = activeSOs.map(so=>{
    const undelivLines = (so.lines||[]).filter(l=>!l.delivered&&!l.fullyDelivered);
    const totalQty = undelivLines.reduce((s,l)=>s+(l.qty||0),0);
    const totalVal = undelivLines.reduce((s,l)=>s+(l.lineTotal||0),0);
    return {...so, undelivLines, totalQty, totalVal};
  }).filter(so=>so.undelivLines.length>0);

  h+=`<div class="sec"><i class="ti ti-clipboard-list"></i>Undelivered Sales Orders (${undeliveredSOs.length})</div>
  <div class="cc">
    ${undeliveredSOs.length===0
      ?`<div style="text-align:center;padding:20px;color:var(--green)"><i class="ti ti-circle-check" style="font-size:28px;display:block;margin-bottom:8px"></i><div style="font-size:14px;font-weight:600">All sales orders delivered!</div></div>`
      :undeliveredSOs.map(so=>`
    <div class="alert-item" style="cursor:pointer" onclick="openSOModal('${so.id}')">
      <div class="alert-icon" style="background:var(--blue2)"><i class="ti ti-clipboard-list" style="color:var(--blue)"></i></div>
      <div class="alert-content">
        <div class="alert-title">${so.id} — ${so.customer}</div>
        <div class="alert-desc">${so.date} · ${so.undelivLines.length} item type${so.undelivLines.length>1?'s':''} · ${so.totalQty} units · ${fmtK(so.totalVal)}</div>
        <div style="font-size:10px;margin-top:3px">
          <span style="background:${so.status==='approved'?'var(--green2)':'var(--amber2)'};color:${so.status==='approved'?'var(--green)':'var(--amber)'};padding:2px 7px;border-radius:99px;font-weight:700;font-size:10px">${(so.status||'pending').toUpperCase()}</span>
        </div>
      </div>
      <i class="ti ti-chevron-right" style="color:var(--text2);font-size:16px;align-self:center;flex-shrink:0"></i>
    </div>`).join('')}
  </div>`;

  document.getElementById('dash').innerHTML = h;
}

function openExpDocs(){
  const emps=S.employees||[];
  const expDocs=(S.empDocuments||[]).filter(d=>{
    if(!d.expiry) return false;
    return Math.floor((new Date(d.expiry)-new Date())/864e5)<=30;
  });
  showModal('Expiring Documents',`<i class="ti ti-file-alert" style="color:var(--purple)"></i>`,
    expDocs.length===0?'<div style="text-align:center;padding:24px;color:var(--green)">No documents expiring soon.</div>'
    :expDocs.map(d=>{
      const emp=emps.find(e=>e.id===d.empId)||{name:d.empName||'?'};
      const days=Math.floor((new Date(d.expiry)-new Date())/864e5);
      return `<div class="modal-row">
        <div class="modal-row-icon" style="background:var(--purple2)"><i class="ti ti-file-alert" style="color:var(--purple)"></i></div>
        <div class="modal-row-content">
          <div class="modal-row-title">${emp.name} — ${d.docType}</div>
          <div class="modal-row-sub">Expires: ${d.expiry} · ${days} day${days!==1?'s':''} left ${days<=7?'⚠ URGENT':''}</div>
        </div>
      </div>`;
    }).join(''));
}

function openSOModal(soId){
  const so=(S.salesOrders||[]).find(s=>s.id===soId);
  if(!so) return;
  const inv=S.inventory||[];
  const undeliv=(so.lines||[]).filter(l=>!l.delivered&&!l.fullyDelivered);
  const all=(so.lines||[]);
  const total=all.reduce((s,l)=>s+(l.lineTotal||0),0);

  showModal(`${so.id} — ${so.customer}`,`<i class="ti ti-clipboard-list" style="color:var(--blue)"></i>`,`
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:var(--text2)">
      <span><i class="ti ti-calendar" style="margin-right:3px"></i>${so.date}</span>
      <span>·</span>
      <span style="color:${so.status==='approved'?'var(--green)':'var(--amber)'};font-weight:700">${(so.status||'pending').toUpperCase()}</span>
      <span>·</span>
      <span>Total: <strong style="color:var(--text)">${fmt(total)}</strong></span>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Line Items</div>
    ${all.map(l=>{
      const item=inv.find(it=>String(it.id)===String(l.itemId));
      const avail=item?item.qty:null;
      const isDeliv=l.delivered||l.fullyDelivered;
      return `<div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
        <div style="width:34px;height:34px;border-radius:9px;background:${isDeliv?'var(--green2)':'var(--amber2)'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i class="ti ${isDeliv?'ti-circle-check':'ti-package'}" style="color:${isDeliv?'var(--green)':'var(--amber)'};font-size:16px"></i>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.desc||l.itemId||'Item'}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px">
            Qty: ${l.qty||0} · Unit: ${fmt(l.unitPrice||0)} · Total: ${fmt(l.lineTotal||0)}
            ${avail!==null?`· Stock: <span style="color:${avail>=(l.qty||0)?'var(--green)':'var(--red)'};font-weight:600">${avail} ${item.unit||'pcs'}</span>`:''}
          </div>
        </div>
        <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;background:${isDeliv?'var(--green2)':'var(--amber2)'};color:${isDeliv?'var(--green)':'var(--amber)'};flex-shrink:0">${isDeliv?'DELIVERED':'PENDING'}</span>
      </div>`;
    }).join('')}
    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:2px solid var(--border2);margin-top:4px">
      <span style="font-size:13px;font-weight:700">Grand Total</span>
      <span style="font-size:16px;font-weight:800;color:var(--blue)">${fmt(total)}</span>
    </div>
    ${so.notes?`<div style="font-size:11px;color:var(--text2);margin-top:10px;padding:8px 10px;background:var(--bg2);border-radius:var(--r-sm);font-style:italic">"${so.notes}"</div>`:''}
  `);
}

// ── PO LIST MODAL ────────────────────────────────────────────────────────────
function openPendingPO(){
  const pos=(S.purchaseOrders||[]).filter(p=>p.status==='pending');
  showModal('Pending Purchase Orders',`<i class="ti ti-truck-delivery" style="color:var(--amber)"></i>`,
    pos.length===0
      ?'<div style="text-align:center;padding:24px;color:var(--green)"><i class="ti ti-circle-check" style="font-size:28px;display:block;margin-bottom:6px"></i>No pending POs.</div>'
      :pos.map(p=>{
        const total=(p.lines||[]).reduce((s,l)=>s+(l.lineTotal||0),0);
        return `<div class="modal-row" style="cursor:pointer" onclick="openPOModal('${p.id}')">
          <div class="modal-row-icon" style="background:var(--amber2)"><i class="ti ti-truck-delivery" style="color:var(--amber)"></i></div>
          <div class="modal-row-content">
            <div class="modal-row-title">${p.id} — ${p.supplier}</div>
            <div class="modal-row-sub">${p.date} · ${(p.lines||[]).length} item(s) · ${fmt(total)}</div>
          </div>
          <i class="ti ti-chevron-right" style="color:var(--text2);font-size:16px;align-self:center"></i>
        </div>`;
      }).join(''));
}

// ── PO DETAIL MODAL ──────────────────────────────────────────────────────────
function openPOModal(poId){
  const po=(S.purchaseOrders||[]).find(p=>p.id===poId);
  if(!po) return;
  const total=(po.lines||[]).reduce((s,l)=>s+(l.lineTotal||0),0);
  const vatAmt=(po.lines||[]).filter(l=>!l.vatExempt).reduce((s,l)=>s+(l.lineTotal||0)/1.12*0.12,0);
  showModal(`${po.id}`,`<i class="ti ti-file-text" style="color:var(--amber)"></i>`,`
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--text2)">
      <span><i class="ti ti-building-store" style="margin-right:3px"></i><strong style="color:var(--text)">${po.supplier}</strong></span>
      <span>·</span>
      <span><i class="ti ti-calendar" style="margin-right:3px"></i>${po.date}</span>
      ${po.deliveryDate?`<span>·</span><span>Del: ${po.deliveryDate}</span>`:''}
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Items Ordered</div>
    ${(po.lines||[]).map(l=>`
    <div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
      <div style="width:34px;height:34px;border-radius:9px;background:var(--amber2);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="ti ti-package" style="color:var(--amber);font-size:16px"></i>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.desc||l.itemId||'Item'}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">Qty: ${l.qty} · Cost: ${fmt(l.unitPrice||0)} · Total: ${fmt(l.lineTotal||0)}</div>
        ${l.vatExempt?`<span style="font-size:9px;color:var(--amber);font-weight:700;background:var(--amber2);padding:2px 6px;border-radius:4px">VAT EXEMPT</span>`:''}
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:13px;font-weight:700">${fmt(l.lineTotal||0)}</div>
      </div>
    </div>`).join('')}
    <div style="padding-top:10px;border-top:2px solid var(--border2);margin-top:4px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px">
        <span>VAT Amount</span><span>${fmt(vatAmt)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:800">
        <span>Total</span><span style="color:var(--amber)">${fmt(total)}</span>
      </div>
    </div>
    ${po.notes?`<div style="font-size:11px;color:var(--text2);margin-top:10px;padding:8px 10px;background:var(--bg2);border-radius:var(--r-sm);font-style:italic">"${po.notes}"</div>`:''}
    <div style="margin-top:14px;display:flex;gap:8px">
      <button class="m-btn approve" style="flex:1" onclick="approvePONow('${po.id}')"><i class="ti ti-check"></i> Approve PO</button>
    </div>
  `);
}

function kc(icon,label,value,color,bg,sub='',clickable=false,onclick=''){
  return `<div class="kcard${clickable?' clickable':''}" ${clickable?`onclick="${onclick}"`:''}>
    <div class="kcard-glow" style="background:${color}"></div>
    <div class="kcard-icon" style="background:${bg}"><i class="ti ${icon}" style="color:${color}"></i></div>
    <div class="kcard-val" style="color:${color}">${value}</div>
    <div class="kcard-label">${label}</div>
    <div class="kcard-sub">${sub}</div>
  </div>`;
}

window.addEventListener('load', () => {
  initFirebase();
  // Wire period select
  const sel = document.getElementById('period-select');
  const cr  = document.getElementById('custom-range');
  const now = new Date();
  sel.addEventListener('change', function() {
    const val = this.value;
    if(val === 'custom') {
      cr.style.display = 'flex';
      document.getElementById('custom-from').value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
      document.getElementById('custom-to').value   = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().slice(0,10);
    } else {
      cr.style.display = 'none';
      period = val; customFrom = ''; customTo = '';
      if(S) render(); else loadData();
    }
  });
  // Wire apply button
  document.getElementById('apply-range-btn').addEventListener('click', function() {
    const f = document.getElementById('custom-from').value;
    const t = document.getElementById('custom-to').value;
    if(!f || !t) { alert('Please select both start and end dates.'); return; }
    if(f > t)    { alert('Start date must be before end date.');     return; }
    period = 'custom'; customFrom = f; customTo = t;
    if(S) render(); else loadData();
  });
});
</script>
